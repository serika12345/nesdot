name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Run format, lint, typecheck, and unit tests
        run: nix develop -c bash -lc 'pnpm install --frozen-lockfile && pnpm verify'

      - name: Run UI console check
        run: nix develop -c bash -lc 'pnpm e2e:install && pnpm verify:ui'
