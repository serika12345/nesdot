name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  verify-pnpm-deps-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Verify fetchPnpmDeps hash
        run: nix develop -c bash -lc 'pnpm nix:check-pnpm-deps-hash'

  verify:
    needs: verify-pnpm-deps-hash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c bash -lc 'pnpm install --frozen-lockfile'

      - name: Run base verification
        run: nix develop -c bash -lc 'pnpm verify'

      - name: Run license verification
        run: nix develop -c bash -lc 'pnpm verify:licenses'

      - name: Run Rust verification
        run: nix develop -c bash -lc 'pnpm verify:rust'

      - name: Run UI console check
        run: nix develop -c bash -lc 'pnpm e2e:install && pnpm verify:ui:console'

      - name: Run dependency CVE audit
        run: nix develop -c bash -lc 'pnpm verify:cve'
