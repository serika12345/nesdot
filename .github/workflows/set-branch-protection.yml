name: Configure Branch Protection

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to protect (defaults to repository default branch)"
        required: false

permissions:
  contents: read
  administration: write

jobs:
  set-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure branch protection
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchInput = github.context.payload?.inputs?.branch || '';
            let branch = branchInput;
            if (!branch) {
              const { data: repoData } = await octokit.rest.repos.get({ owner, repo });
              branch = repoData.default_branch;
            }
            core.info(`Applying branch protection to ${branch}`);

            const protectionBody = {
              required_status_checks: { strict: true, contexts: ['PR Safety Checks'] },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false
            };

            try {
              await octokit.rest.repos.updateBranchProtection({ owner, repo, branch, ...protectionBody });
              core.info('Branch protection applied via updateBranchProtection');
            } catch (err) {
              core.warning('updateBranchProtection failed: ' + String(err));
              try {
                await octokit.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', { owner, repo, branch, ...protectionBody });
                core.info('Branch protection applied via raw request');
              } catch (err2) {
                core.setFailed('Failed to apply branch protection: ' + String(err2));
              }
            }

            // Try to enable required commit signatures (may not be available on all repos/orgs)
            try {
              await octokit.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection/required_signatures', { owner, repo, branch });
              core.info('Enabled required commit signatures (if supported).');
            } catch (e) {
              core.warning('Could not enable required commit signatures: ' + String(e));
            }
