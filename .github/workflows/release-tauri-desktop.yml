name: release-tauri-desktop

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Run full verification
        run: >-
          nix develop -c bash -lc
          'pnpm install --frozen-lockfile && pnpm e2e:install && pnpm verify:full'

      - name: Run Rust verification
        run: nix develop -c bash -lc 'pnpm verify:rust'

  release:
    needs: verify-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Validate tag and app versions
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(awk -F '"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)"

          if [ "${package_version}" != "${tag_version}" ]; then
            echo "package.json version mismatch: ${package_version} != ${tag_version}"
            exit 1
          fi

          if [ "${tauri_version}" != "${tag_version}" ]; then
            echo "src-tauri/tauri.conf.json version mismatch: ${tauri_version} != ${tag_version}"
            exit 1
          fi

          if [ "${cargo_version}" != "${tag_version}" ]; then
            echo "src-tauri/Cargo.toml version mismatch: ${cargo_version} != ${tag_version}"
            exit 1
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure ad-hoc signing for macOS
        if: matrix.platform == 'macos-latest'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build and release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_BASE_PATH: /
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: nesdot ${{ github.ref_name }}
          releaseBody: |
            Automated desktop release from tag ${{ github.ref_name }}.

            Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
