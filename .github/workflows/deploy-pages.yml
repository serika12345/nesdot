name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build site
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: >-
          nix develop -c bash -lc
          'pnpm install --frozen-lockfile && pnpm e2e:install && pnpm verify:full && pnpm build'

      - name: Package pages artifact
        run: >-
          tar
          --dereference
          --hard-dereference
          --directory dist
          -cvf "$RUNNER_TEMP/artifact.tar"
          --exclude=.git
          --exclude=.github
          --exclude=".[^/]*"
          .

      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
